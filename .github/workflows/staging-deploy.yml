name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Debug variables
        run: |
          echo "GCP_REGION from env: ${{ env.GCP_REGION }}"
          echo "GCP_PROJECT from vars: ${{ vars.GCP_PROJECT }}"
          echo "ARTIFACT_REPO from env: ${{ env.ARTIFACT_REPO }}"
          
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ vars.WIF_PROVIDER_ID }}'
          service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          
      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ vars.STAGING_GCP_REGION }}-docker.pkg.dev'
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/relayer/Dockerfile.staging
          push: true
          tags: |
            ${{ vars.STAGING_GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.STAGING_ARTIFACT_REPO }}/${{ vars.STAGING_IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.STAGING_GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.STAGING_ARTIFACT_REPO }}/${{ vars.STAGING_IMAGE_NAME }}:latest
            
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ vars.WIF_PROVIDER_ID }}'
          service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.STAGING_SERVICE_NAME }} \
            --image=${{ vars.STAGING_GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.STAGING_ARTIFACT_REPO }}/${{ vars.STAGING_IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ vars.STAGING_GCP_REGION }}
